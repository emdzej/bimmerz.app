<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 60" fill="none">
  <!--
    Light-theme variant of the ///B emblem. B fills with the
    foreground dark navy (#0a1424). Geometry identical to
    `icon-dark.svg`; only the B's fill differs.

    Loaded by VitePress's image `light` slot when the page is in
    light mode. The other variant (`icon-dark.svg`) is used in dark
    mode — `currentColor` doesn't propagate through `<img src>`, so
    we ship two flat-coloured files instead.
  -->
