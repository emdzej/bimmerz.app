<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="none">
  <!--
    ///B emblem riff. Three M-tricolour parallelograms (light blue,
    dark blue, red) leaning ~19° down-left, then a heavy B rendered
    as system-font text so the glyph is a real B, not a hand-drawn
    approximation.
    The text sits inside a `skewX(-19)` group so its slant matches
    the stripes exactly, positioned so the character's left edge
    starts at the red stripe's top-right corner (x=55). The same
    skew then carries the character's bottom-left to (34, baseline),
    tracing the red stripe's right edge.
    `font-size=78` puts the cap-height close to the stripes' 60-pixel
    height; the slight (~3px) difference at the top is the trade-off
    for using real glyph metrics over a hand-drawn path.
    Transparent background; the B uses `currentColor` so it picks up
    the page text colour (dark on light theme, light on dark).
  -->
  <polygon points="22,0 33,0 12,60 1,60" fill="#1c69d4" />
  <polygon points="33,0 44,0 23,60 12,60" fill="#0a1f4d" />
  <polygon points="44,0 55,0 34,60 23,60" fill="#c41e3a" />
  <g transform="skewX(-19)">
    <text
      x="55"
      y="58"
      font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="78"
      font-weight="900"
      fill="currentColor"
    >B</text>
  </g>
</svg>
