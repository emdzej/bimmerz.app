<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="none">
  <!--
    Logo riff on BMW's ///M emblem — three slanted M-tricolour stripes
    on the left, italic-bold B sitting against the red stripe like the
    M does on the original. Transparent background; the B picks up the
    page's text colour via `currentColor`, so it reads black on the
    light theme and white on the dark theme.
  -->
  <polygon points="6,0 17,0 -5,60 -16,60" fill="#1c69d4" />
  <polygon points="17,0 28,0 6,60 -5,60" fill="#0a1f4d" />
  <polygon points="28,0 39,0 17,60 6,60" fill="#c41e3a" />
  <text
    x="30"
    y="55"
    font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif"
    font-size="68"
    font-weight="900"
    font-style="italic"
    fill="currentColor"
  >B</text>
</svg>
